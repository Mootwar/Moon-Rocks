services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
      POSTGRES_DB: rockshop_inventory_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  backend:
    # point to the Dockerfile that now runs both Node & Python
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    ports:
      - "3000:3000"   # Express API & static site
      - "5000:5000"   # Python embedding micro-service
    volumes:
      - ./public:/rockshop-app/public
    environment:
      NODE_ENV: development

volumes:
  db_data:
