<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Shop Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="index.html">Rock Shop</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Inventory</a></li>
        <li class="nav-item"><a class="nav-link" href="add.html">Add Mineral</a></li>
      </ul>
    </div>
  </nav>

  <main class="container mt-4">
    <h1>Inventory</h1>
    <button id="fetch-minerals" class="btn btn-primary mb-3">Load Minerals</button>
    <section id="image-search">
      <h2>Search by Image</h2>
      <input type="file" id="searchImageFile" accept="image/*" />
      <button id="searchImageBtn">Search</button>
      <div id="searchResults"></div>
    </section>
    
    <script>
      document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchImageBtn').onclick = async () => {
        const fileInput = document.getElementById('searchImageFile');
        if (!fileInput.files.length) {
          alert('Choose an image first.');
          return;
        }
        const form = new FormData();
        form.append('image', fileInput.files[0]);
    
        // 1) Upload image to embed‐svc & get matches
        const resp = await fetch('http://localhost:8000/query', {
          method: 'POST',
          body: form
        });
        if (!resp.ok) {
          alert('Search failed: ' + await resp.text());
          return;
        }
        const results = await resp.json();  // expect [{id,name,price,amount,image_path,cosine,euclid}, …]
    
        // 2) Render results
        const container = document.getElementById('searchResults');
        container.innerHTML = `
          <h3>Top matches:</h3>
          <table class="table">
            <thead>
              <tr>
                <th>ID</th><th>Name</th><th>Price</th><th>Score</th><th>Image</th>
              </tr>
            </thead>
            <tbody>
              ${results.map(r => `
                <tr>
                  <td>${r.id}</td>
                  <td>${r.name}</td>
                  <td>$${r.price.toFixed(2)}</td>
                  <td>${r.cosine.toFixed(4)}</td>
                  <td><img src="${r.image_path}" height="40"/></td>
                </tr>
              `).join('')}
            </tbody>
          </table>`;
            };
      });
    </script>
    <div class="row mb-3">
      <div class="col-md-6">
        <input type="text" id="search-name" class="form-control" placeholder="Search by name"/>
      </div>
      <div class="col-md-6">
        <input type="number" id="search-weight" class="form-control" placeholder="Search by weight"/>
      </div>
    </div>

    <table class="table table-striped" id="minerals-table">
      <thead>
        <tr>
          <th data-sort="id">ID</th>
          <th data-sort="name">Name</th>
          <th data-sort="price">Price</th>
          <th data-sort="amount">Amount</th>
          <th data-sort="weight">Weight</th>
          <th>Image</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>   
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/scripts/inventory.js"></script>
</body>
</html>
